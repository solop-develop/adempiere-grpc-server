syntax = "proto3";


option java_multiple_files = true;
option java_package = "org.spin.backend.grpc.field.inout";
option java_outer_classname = "ADempiereInOut";

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

import "base_data_type.proto";

// Base URL
// /fields/in-outs/

package field.in_out;

// The in-out service definition.
service InOutInfoService {
	// Business Partner Filters
	rpc ListBusinessPartners(ListBusinessPartnersRequest) returns (data.ListLookupItemsResponse) {
		option (google.api.http) = {
			get: "/fields/in-outs/business-partners"
		};
	}
	// Shipper Filters
	rpc ListShippers(ListShippersRequest) returns (data.ListLookupItemsResponse) {
		option (google.api.http) = {
			get: "/fields/in-outs/shippers"
		};
	}
	// Invoices Filters
	rpc ListInvoices(ListInvoicesRequest) returns (data.ListLookupItemsResponse) {
		option (google.api.http) = {
			get: "/fields/in-outs/invoices"
		};
	}

	// Result a One
	rpc GetInOutInfo(GetInOutInfoRequest) returns (InOutInfo) {
		option (google.api.http) = {
			get: "/fields/in-outs/{id}"
			additional_bindings: {
				get: "/fields/in-outs/uuid/{uuid}"
			}
			additional_bindings: {
				get: "/fields/in-outs/code/{code}"
			}
		};
	}
	// Result a List
	rpc ListInOutInfo(ListInOutInfoRequest) returns (ListInOutInfoResponse) {
		option (google.api.http) = {
			get: "/fields/in-outs"
			additional_bindings: {
				get: "/fields/in-outs/table/{table_name}/{column_name}"
			}
			additional_bindings: {
				get: "/fields/in-outs/column/{column_id}"
			}
			additional_bindings: {
				get: "/fields/in-outs/field/{field_id}"
			}
			additional_bindings: {
				get: "/fields/in-outs/parameter/{process_parameter_id}"
			}
			additional_bindings: {
				get: "/fields/in-outs/query-criteria/{browse_field_id}"
			}
			additional_bindings: {
				get: "/fields/in-outs/display-definition/{display_definition_field_id}"
			}
		};
	}
}


// Business Partner
message BusinessPartner {
	int32 id = 1;
	string uuid = 2;
	string value = 3;
	string display_value = 4;
	string tax_id = 5;
	string name = 6;
	string description = 7;
}
message ListBusinessPartnersRequest {
	string filters = 1;
	string sort_by = 2;
	repeated string group_columns = 3;
	repeated string select_columns = 4;
	int32 page_size = 5;
	string page_token = 6;
	string search_value = 7;
	string context_attributes = 8;
	bool is_only_active_records = 9;
	bool is_without_validation = 10;
	google.protobuf.Value current_value = 11;
	// custom filters
	string is_sales_transaction = 12;
}


// Shippers
message ListShippersRequest {
	string filters = 1;
	string sort_by = 2;
	repeated string group_columns = 3;
	repeated string select_columns = 4;
	int32 page_size = 5;
	string page_token = 6;
	string search_value = 7;
	string context_attributes = 8;
	bool is_only_active_records = 9;
	bool is_without_validation = 10;
	google.protobuf.Value current_value = 11;
}


// Invoices
message ListInvoicesRequest {
	string filters = 1;
	string sort_by = 2;
	repeated string group_columns = 3;
	repeated string select_columns = 4;
	int32 page_size = 5;
	string page_token = 6;
	string search_value = 7;
	string context_attributes = 8;
	bool is_only_active_records = 9;
	bool is_without_validation = 10;
	google.protobuf.Value current_value = 11;
	// custom filters
	string is_sales_transaction = 12;
}



// InOut Info
message GetInOutInfoRequest {
	int32 id = 1;
	string uuid = 2;
	string code = 3; // Document No
}
message ListInOutInfoRequest {
	string filters = 1;
	string sort_by = 2;
	repeated string group_columns = 3;
	repeated string select_columns = 4;
	int32 page_size = 5;
	string page_token = 6;
	string search_value = 7;
	string context_attributes = 8;
	bool is_only_active_records = 9;
	bool is_without_validation = 10;
	google.protobuf.Value current_value = 11;
	// references
	int32 reference_id = 12;
	string table_name = 13;
	string column_name = 14;
	int32 column_id = 15;
	int32 field_id = 16;
	int32 process_parameter_id = 17;
	int32 browse_field_id = 18;
	int32 display_definition_field_id = 19;
	// custom filters
	string document_no = 20;
	int32 business_partner_id = 21;
	string is_sales_transaction = 22;
	string description = 23;
	google.protobuf.Timestamp movement_date_from = 24;
	google.protobuf.Timestamp movement_date_to = 25;
	string order_reference = 26; // PO Reference
	int32 shipper_id = 27;
	int32 invoice_id = 28;
}

message InOutInfo {
	int32 id = 1;
	string uuid = 2;
	string display_value = 3;
	string document_no = 4;
	google.protobuf.Timestamp movement_date = 5;
	string movement_date_formatted = 6;
	bool is_sales_transaction = 7;
	BusinessPartner business_partner = 8;
	string description = 9;
	string order_reference = 10; // PO Reference
	string shipper_name = 11;
	google.protobuf.Timestamp ship_date = 12;
	string ship_date_formatted = 13;
	string traking_no = 14;
	bool is_drop_shipment = 15;
	data.DocumentStatus document_status = 16;
	BusinessPartner drop_shipment_partner = 17;
	string invoice_no = 18;
	google.protobuf.Timestamp invoice_date = 19;
	string invoice_date_formatted = 20;
	string order_no = 21;
	google.protobuf.Timestamp order_date = 22;
	string order_date_formatted = 23;
}

message ListInOutInfoResponse {
	int64 record_count = 1;
	repeated InOutInfo records = 2;
	string next_page_token = 3;
}
